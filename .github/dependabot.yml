version: 2

registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{ secrets.GH_TOKEN }}
  git-github:
    type: git
    url: https://github.com
    username: x-access-token
    password: '${{ secrets.GH_TOKEN }}'

updates:
  - package-ecosystem: npm
    schedule:
      interval: weekly
      day: sunday
    groups:
      npm-dependencies:
        patterns:
          - "*"
    directories:
      - "/"
    commit-message:
      prefix: fix(dependabot)
    registries:
      - npm-github
      - git-github
    cooldown:
      default-days: 7
      exclude:
        - "@typeform/*"
    ignore:
      # eslint v10 removes context.getFilename() which eslint-plugin-react v7.x
      # still relies on, causing "contextOrFilename.getFilename is not a function".
      # Stay on eslint v9.x until eslint-plugin-react ships a compatible release.
      - dependency-name: "eslint"
        versions: [">=10"]

  - package-ecosystem: github-actions
    schedule:
      interval: weekly
      day: sunday
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
    directory: "/"
    commit-message:
      prefix: build(dependabot)
    registries:
      - git-github
